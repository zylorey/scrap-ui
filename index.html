<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader | YouTube, Facebook, TikTok, Instagram</title>
    <meta name="description" content="Download videos from YouTube, Facebook, TikTok, and Instagram">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Helvetica, Arial, sans-serif;
        }

        :root {
            --primary-color: #0023e4;
            --secondary-color: #0066ff;
            --accent-color: #0047b3;
            --dark-bg: #0a0a16;
            --darker-bg: #050510;
            --card-bg: #111127;
            --text-primary: #ffffff;
            --text-secondary: #a0a0c0;
        }

        body {
            background: var(--darker-bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }

        .download-form {
            background: linear-gradient(
                145deg,
                #1a1a2e 0%,
                #16213e 25%,
                #0f3460 50%,
                #0023e4 75%,
                #0047b3 100%
            );
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.6),
                0 15px 30px rgba(0, 35, 228, 0.3),
                inset 0 2px 0 rgba(255, 255, 255, 0.1),
                inset 0 -2px 0 rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 35, 228, 0.4);
            position: relative;
            overflow: hidden;
        }

        .download-form::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            border-radius: 18px;
            background: linear-gradient(145deg,
                rgba(255, 255, 255, 0.05) 0%,
                transparent 50%,
                rgba(0, 0, 0, 0.1) 100%);
            pointer-events: none;
            z-index: 1;
        }

        .download-form::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: -15px;
            background: linear-gradient(145deg, 
                rgba(0, 0, 0, 0.4) 0%, 
                rgba(0, 35, 228, 0.2) 100%);
            border-radius: 25px;
            z-index: -1;
            filter: blur(20px);
            opacity: 0.8;
        }

        .form-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            position: relative;
            z-index: 2;
        }

        .url-input {
            flex: 1;
            padding: 18px 25px;
            border: none;
            border-radius: 12px;
            background: rgba(15, 15, 25, 0.9);
            color: var(--text-primary);
            font-size: 1.1rem;
            border: 1px solid rgba(0, 35, 228, 0.5);
            transition: all 0.3s ease;
            box-shadow: 
                inset 0 3px 6px rgba(0, 0, 0, 0.5),
                0 3px 10px rgba(0, 35, 228, 0.2);
            backdrop-filter: blur(12px);
        }

        .url-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 
                inset 0 3px 6px rgba(0, 0, 0, 0.5),
                0 0 25px rgba(0, 71, 179, 0.5),
                0 0 35px rgba(0, 35, 228, 0.4);
            background: rgba(15, 15, 25, 0.95);
        }

        .url-input::placeholder {
            color: var(--text-secondary);
        }

        .download-btn {
            padding: 18px 35px;
            background: linear-gradient(145deg, 
                #0023e4 0%, 
                #0047b3 50%, 
                #0066ff 100%);
            border: none;
            border-radius: 12px;
            color: var(--text-primary);
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 
                0 10px 25px rgba(0, 35, 228, 0.4),
                0 5px 15px rgba(0, 0, 0, 0.4),
                inset 0 2px 0 rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            z-index: 2;
            border: 1px solid rgba(0, 35, 228, 0.6);
        }

        .download-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.3) 50%,
                rgba(255, 255, 255, 0) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: 12px;
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 15px 30px rgba(0, 35, 228, 0.6),
                0 8px 20px rgba(0, 0, 0, 0.5),
                inset 0 2px 0 rgba(255, 255, 255, 0.3),
                0 0 20px rgba(0, 100, 255, 0.4);
            background: linear-gradient(145deg, 
                #0033ff 0%, 
                #0055cc 50%, 
                #0077ff 100%);
        }

        .download-btn:hover::before {
            opacity: 1;
        }

        .download-btn:active {
            transform: translateY(-1px);
            box-shadow: 
                0 5px 15px rgba(0, 35, 228, 0.4),
                0 3px 8px rgba(0, 0, 0, 0.4);
        }

        .download-btn:active::before {
            opacity: 0.5;
        }

        .supported-platforms {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }

        .platform {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: var(--text-primary); 
            font-size: 1rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
            box-shadow: 
                0 6px 15px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.08),
                inset 0 -1px 0 rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .platform::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, 
                rgba(0, 35, 228, 0.15) 0%, 
                rgba(0, 71, 179, 0.1) 50%,
                transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: 16px;
        }

        .platform:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
            color: var(--text-primary);
            box-shadow: 
                0 10px 25px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.12),
                inset 0 -1px 0 rgba(0, 0, 0, 0.25),
                0 0 15px rgba(0, 35, 228, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .platform:hover::before {
            opacity: 1;
        }

        .platform i {
            color: #ffffff; 
            font-size: 1.3rem;
            position: relative;
            z-index: 1;
            filter: brightness(1);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .bg-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-element {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, 
                rgba(26, 26, 46, 0.3) 0%, 
                rgba(15, 52, 96, 0.2) 30%,
                transparent 70%);
            animation: float 20s infinite linear;
            filter: blur(2px);
        }

        .bg-element:nth-child(1) {
            width: 400px;
            height: 400px;
            top: 10%;
            left: 5%;
            animation-duration: 25s;
            background: radial-gradient(circle, 
                rgba(26, 26, 46, 0.4) 0%, 
                rgba(15, 52, 96, 0.3) 40%,
                transparent 70%);
        }

        .bg-element:nth-child(2) {
            width: 300px;
            height: 300px;
            top: 60%;
            right: 5%;
            animation-duration: 20s;
            animation-direction: reverse;
            background: radial-gradient(circle, 
                rgba(15, 52, 96, 0.3) 0%, 
                rgba(0, 35, 228, 0.2) 30%,
                transparent 70%);
        }

        .bg-element:nth-child(3) {
            width: 200px;
            height: 200px;
            bottom: 10%;
            left: 15%;
            animation-duration: 30s;
            background: radial-gradient(circle, 
                rgba(26, 26, 46, 0.25) 0%, 
                rgba(0, 35, 228, 0.15) 20%,
                transparent 70%);
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            25% { transform: translate(30px, -40px) rotate(90deg) scale(1.1); }
            50% { transform: translate(-20px, 20px) rotate(180deg) scale(0.9); }
            75% { transform: translate(40px, 30px) rotate(270deg) scale(1.05); }
            100% { transform: translate(0, 0) rotate(360deg) scale(1); }
        }

        @media (max-width: 768px) {
            .form-group { flex-direction: column; }
            .download-btn { justify-content: center; }
            .supported-platforms { gap: 15px; }
            .platform { padding: 10px 15px; font-size: 0.9rem; }
        }

        @media (max-width: 480px) {
            .download-form { padding: 30px 20px; }
            .url-input { padding: 15px 20px; }
            .download-btn { padding: 15px 25px; }
            .platform { padding: 8px 12px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="bg-elements">
        <div class="bg-element"></div>
        <div class="bg-element"></div>
        <div class="bg-element"></div>
    </div>

    <div class="container">
        <section class="download-form">
            <div class="form-group">
                <input type="text" class="url-input" placeholder="Paste video URL here..." id="videoUrl">
                <button class="download-btn" id="downloadBtn">
                    <i class="fas fa-download"></i>
                    Download
                </button>
            </div>
            
            <div class="supported-platforms">
                <div class="platform">
                    <i class="fab fa-youtube"></i>
                    YouTube
                </div>
                <div class="platform">
                    <i class="fab fa-facebook"></i>
                    Facebook
                </div>
                <div class="platform">
                    <i class="fab fa-tiktok"></i>
                    TikTok
                </div>
                <div class="platform">
                    <i class="fab fa-instagram"></i>
                    Instagram
                </div>
            </div>
        </section>
    </div>

    <script src="js/script.js"></script>
</body>
</html>

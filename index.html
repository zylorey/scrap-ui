<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader | YouTube, Facebook, TikTok, Instagram</title>
    <meta name="description" content="Download videos from YouTube, Facebook, TikTok, and Instagram">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
</head>
<body>
    <!-- Animated Background Elements -->
    <div class="bg-elements">
        <div class="bg-element"></div>
        <div class="bg-element"></div>
        <div class="bg-element"></div>
    </div>

    <div class="container">
        <section class="download-form">
            <div class="form-group">
                <input type="text" class="url-input" placeholder="Paste video URL here..." id="videoUrl">
                <button class="download-btn" id="downloadBtn">
                    <i class="fas fa-download"></i>
                    Download
                </button>
            </div>
            
            <div class="supported-platforms">
                <div class="platform">
                    <i class="fab fa-youtube"></i>
                    YouTube
                </div>
                <div class="platform">
                    <i class="fab fa-facebook"></i>
                    Facebook
                </div>
                <div class="platform">
                    <i class="fab fa-tiktok"></i>
                    TikTok
                </div>
                <div class="platform">
                    <i class="fab fa-instagram"></i>
                    Instagram
                </div>
            </div>
        </section>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
